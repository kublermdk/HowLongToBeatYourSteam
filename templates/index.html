<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLTBYS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='clean.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    {% include 'header.html' %}

    <main>
        <div class="form-container">
            <form id="redirectForm" action="/redirect" method="post">
                <label for="idInput">Enter your Steam ID:</label>
                <p id="idHint" class="id-hint"></p>
                <input type="text" id="idInput" name="id" required autocomplete="off" list="recentSteamIds">
                <datalist id="recentSteamIds"></datalist>
                <button id="submit" type="submit">View library</button>
            </form>
        </div>
    </main>

    <script>
        'use strict';

        const STORAGE_KEY = 'hltbys_steam_id';
        const RECENT_KEY = 'hltbys_recent_steam_ids';
        const configSteamId = {{ default_steam_id | tojson }};
        const idInput = document.getElementById('idInput');
        const idHint = document.getElementById('idHint');
        const recentList = document.getElementById('recentSteamIds');

        function loadRecentIds() {
            try {
                return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
            } catch {
                return [];
            }
        }

        function saveRecentId(steamId) {
            const trimmed = steamId.trim();
            if (!trimmed) {
                return;
            }

            const recent = loadRecentIds().filter((id) => id !== trimmed);
            recent.unshift(trimmed);
            localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 5)));
            localStorage.setItem(STORAGE_KEY, trimmed);
        }

        function populateSuggestions() {
            const recent = loadRecentIds();
            recentList.innerHTML = '';

            for (const steamId of recent) {
                const option = document.createElement('option');
                option.value = steamId;
                recentList.appendChild(option);
            }
        }

        function resolveDefaultId() {
            if (configSteamId) {
                return configSteamId;
            }

            return localStorage.getItem(STORAGE_KEY) || '';
        }

        const defaultId = resolveDefaultId();
        if (defaultId) {
            idInput.value = defaultId;
        }

        if (configSteamId) {
            idHint.textContent = 'Default from config.local.py. You can still enter a different ID.';
        } else if (defaultId) {
            idHint.textContent = 'Using your last Steam ID from this browser.';
        }

        populateSuggestions();

        document.getElementById('redirectForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const id = idInput.value.trim();
            if (!id) {
                return;
            }

            saveRecentId(id);
            window.location.href = '/results/' + encodeURIComponent(id);
        });
    </script>
</body>
</html>
